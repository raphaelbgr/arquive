# Face Detection & Recognition System Configuration

# Reference faces directory
faces_dir: "./recognition/faces"

# Media directories to scan (local or network paths)
media_dirs:
  - "F:/Raphael/Backups/Raphael"
  - "H:/"
  # - "\\\\192.168.1.x\\Shared\\Media"

# Skip files already processed in previous runs
skip_processed: true

# Exclude these folder names from scanning (junctions/symlinks don't work over SMB)
exclude_dirs:
  - "Link to media folder"
  - "Live Photos - Videos under 5s"
  - "Locked Folder"
  - "Moved by mistake"
  - ".metadata"
  - "exiftool"
  - "ffmpeg"
  - "$RECYCLE.BIN"
  - "System Volume Information"
  - "Recovery"
  - "DRIVERS Samsung"

# Recognition settings
recognition:
  model: "buffalo_l"
  det_size: [640, 640]
  threshold: 0.45
  # Presets: high_precision=0.50, balanced=0.45, high_recall=0.35

# Video processing
video:
  sample_fps: 2
  batch_size: 16
  merge_gap_seconds: 3

# Coordinator settings
coordinator:
  host: "0.0.0.0"
  port: 8600
  task_timeout_seconds: 300

# Worker definitions
# path_map: translates coordinator paths (Windows local) to worker-accessible paths (SMB)
workers:
  - name: "desktop"
    host: "localhost"
    gpu: "cuda"
    locality_paths:
      - "F:/"
      - "H:/"
      - "D:/"
      - "C:/"
    path_map: {}  # no translation needed, files are local
  - name: "avell"
    host: "192.168.1.x"
    ssh_alias: "avell"
    gpu: "cuda"
    locality_paths: []
    path_map:
      "F:/": "//192.168.1.x/Trunk 2 - 3TB drive/"
      "H:/": "//192.168.1.x/Trunk 4 - 8TB drive/"
  - name: "mac-mini"
    host: "192.168.1.x"
    ssh_alias: "mac-mini"
    gpu: "coreml"
    locality_paths: []
    path_map:
      "F:/": "/Users/rbgnr/mnt/trunk2/"
      "H:/": "/Users/rbgnr/mnt/trunk4/"

# Output settings
output:
  db_path: "./results/faces.db"
  thumbnails_dir: "./results/thumbs"
  json_path: "./results/results.json"
  html_path: "./results/report.html"

# Persons to hide from HTML report (data still in DB, just not displayed)
hide_persons:
  - "Monique Ferreira"

# ===================================================================
# Arquive extensions
# ===================================================================

# Server settings
server:
  host: "0.0.0.0"
  port: 64531

# Authentication
auth:
  sec_level: "simple-password"  # simple-password | user-account | forever
  session_duration: "365d"

# Transcode cache
cache:
  enabled: true
  directory: ""  # empty = OS temp directory
  limit_gb: 20.0
  preload_seconds: 20

# GPU transcoding fleet (extends existing workers)
transcode:
  gpu_busy_threshold: 80
  poll_interval_seconds: 5
  encoders:
    desktop:
      encoder: nvenc
      health_check: "nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader"
      priority: 1
    avell:
      encoder: nvenc
      health_check: "nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader"
      priority: 2
    mac-mini:
      encoder: videotoolbox
      health_check: "powermetrics --samplers gpu_power -n 1 -i 100"
      priority: 3

# AI descriptions (Qwen2.5-VL on Mac Mini M4 via Ollama)
ai:
  model: "qwen2.5-vl"
  endpoint: "http://mac-mini:11434/api/generate"
  enabled: true
  batch_size: 50
  describe_videos: true
  keyframe_count: 5

# IPTV / Live TV
iptv:
  enabled: true
  recording_dir: "F:/Recordings"
  epg_refresh_hours: 12
  playlist_refresh_hours: 24

# DLNA / UPnP server
dlna:
  enabled: false
  friendly_name: "Arquive Media Server"
